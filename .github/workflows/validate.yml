name: validate

on:
  push:
  pull_request:

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate JSON registry
        run: python3 -m json.tool registry/capabilities.json >/dev/null
      - name: Run Python tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
